<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">

<div class="auth-box">

    <h2>Login</h2>

    <!-- Autofill block -->
    <input type="text" style="display:none">
    <input type="password" style="display:none">

    <!-- Username -->
    <input id="username" name="random-user" placeholder="Username" autocomplete="off">

    <!-- Password -->
    <div class="pass-box">
        <input id="password" name="random-pass" type="password" placeholder="Password" autocomplete="new-password">
        <span onclick="togglePassword('password')">👁</span>
    </div>

    <!-- Role -->
    <div class="roles">
        <button type="button" class="role-btn active" onclick="setRole('member', this)">Member</button>
        <button type="button" class="role-btn" onclick="setRole('admin', this)">Admin</button>
    </div>

    <!-- Login -->
    <button type="button" onclick="login()">Proceed</button>

    <!-- 🔥 Signup Link -->
    <p style="text-align:center; margin-top:10px;">
        Don’t have an account? 
        <a href="/signup">Signup</a>
    </p>

</div>

<script src="/static/app.js"></script>

</body>
</html>
